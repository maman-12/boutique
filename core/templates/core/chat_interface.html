{% extends 'base.html' %}
{% load static %}

{% block title %}Messagerie - Ma Boutique{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-wrapper">
        <!-- Sidebar -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <h5 class="fw-bold mb-0"><i class="fas fa-comment-dots text-primary me-2"></i>Messages</h5>
                <span class="badge bg-primary rounded-pill" id="totalClients">0</span>
            </div>
            
            <div class="sidebar-search">
                <input type="text" class="form-control" placeholder="🔍 Rechercher..." id="searchClient">
            </div>
            
            <div class="sidebar-contacts" id="clientList">
                <div class="text-center text-muted small py-4">
                    <i class="fas fa-spinner fa-spin me-2"></i> Chargement...
                </div>
            </div>
        </div>
        
        <!-- Zone de chat -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary d-md-none" id="toggleSidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="chat-avatar" id="chatAvatar">👤</div>
                    <div>
                        <h6 class="fw-bold mb-0" id="chatUserName">Sélectionnez un contact</h6>
                        <small class="text-muted" id="chatUserStatus">Hors ligne</small>
                    </div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="text-center text-muted small py-5">
                    <i class="fas fa-comment-dots fa-3x d-block mb-3 opacity-25"></i>
                    <p>Sélectionnez une conversation</p>
                </div>
            </div>
            
            <div class="chat-input-area">
                <form id="chatForm" class="d-flex gap-2">
                    <input type="text" id="chatInput" class="form-control rounded-pill" 
                           placeholder="Écrivez votre message..." required>
                    <button type="submit" class="btn btn-primary-gradient rounded-pill px-4">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.chat-container {
    position: relative;
    height: calc(100vh - 160px);
    min-height: 500px;
}

.chat-wrapper {
    display: flex;
    height: 100%;
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
}

.chat-sidebar {
    width: 320px;
    min-width: 320px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    background: var(--bg-body);
}

.sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
}

.sidebar-search .form-control {
    border-radius: 50px;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    font-size: 0.9rem;
}

.sidebar-contacts {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}

.contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
}

.contact-item:hover {
    background: var(--bg-hover);
}

.contact-item.active {
    background: var(--bg-hover);
    border-left-color: var(--primary);
}

.contact-item .contact-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    flex-shrink: 0;
}

.contact-item .contact-info {
    flex: 1;
    min-width: 0;
}

.contact-item .contact-info .name {
    font-weight: 600;
    font-size: 0.95rem;
}

.contact-item .contact-info .last-message {
    font-size: 0.8rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.contact-item .contact-meta {
    text-align: right;
    flex-shrink: 0;
}

.contact-item .contact-meta .time {
    font-size: 0.65rem;
    color: var(--text-muted);
}

.contact-item .contact-meta .badge-unread {
    background: var(--primary);
    color: #fff;
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 50%;
    min-width: 18px;
    text-align: center;
    display: inline-block;
}

.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header .chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    flex-shrink: 0;
    font-size: 1.2rem;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--bg-body);
}

.message {
    max-width: 70%;
    padding: 10px 16px;
    border-radius: 16px;
    word-wrap: break-word;
    animation: messageIn 0.3s ease;
}

.message.sent {
    align-self: flex-end;
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 4px;
}

.message.received {
    align-self: flex-start;
    background: var(--bg-card);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.message .message-time {
    font-size: 0.6rem;
    opacity: 0.6;
    margin-top: 4px;
    text-align: right;
}

@keyframes messageIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.chat-input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border-color);
}

.chat-input-area .form-control {
    border-radius: 50px;
    padding: 10px 16px;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
}

.chat-input-area .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
}

@media (max-width: 768px) {
    .chat-sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 100%;
        min-width: unset;
        z-index: 10;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        border-right: none;
    }
    .chat-sidebar.open {
        transform: translateX(0);
    }
    .chat-main {
        width: 100%;
    }
    .message {
        max-width: 85%;
    }
}
</style>

<script>
// ==========================================
// WEBSOCKET
// ==========================================
const ws = new WebSocket('ws://' + window.location.host + '/ws/chat/');

let currentUser = '{{ user.username }}';
let isSupport = {{ is_support|yesno:"true,false" }};
let currentRecipient = null;

const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatForm = document.getElementById('chatForm');
const chatUserName = document.getElementById('chatUserName');
const chatUserStatus = document.getElementById('chatUserStatus');
const clientList = document.getElementById('clientList');
const searchInput = document.getElementById('searchClient');
const toggleSidebar = document.getElementById('toggleSidebar');
const chatSidebar = document.getElementById('chatSidebar');

// ==========================================
// WEBSOCKET ÉVÉNEMENTS
// ==========================================
ws.onopen = function() {
    console.log('WebSocket connecté');
    ws.send(JSON.stringify({ action: 'get_contacts' }));
};

ws.onmessage = function(e) {
    const data = JSON.parse(e.data);
    console.log('Message reçu:', data);
    
    switch(data.type) {
        case 'contacts':
            renderContacts(data.contacts);
            break;
            
        case 'conversation':
            renderMessages(data.messages, data.other_user);
            break;
            
        case 'new_message':
            const msg = data.message;
            console.log('Nouveau message:', msg);
            if (msg.expediteur === currentRecipient || msg.expediteur === currentUser) {
                addMessage(msg.contenu, msg.expediteur !== currentUser, msg.date_envoi);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            ws.send(JSON.stringify({ action: 'get_contacts' }));
            break;
            
        case 'message_sent':
            console.log('Message envoyé');
            ws.send(JSON.stringify({ action: 'get_contacts' }));
            break;
            
        case 'support_notification':
            if (isSupport) {
                ws.send(JSON.stringify({ action: 'get_contacts' }));
            }
            break;
            
        case 'historique':
            console.log('Historique:', data.messages);
            break;
    }
};

// ==========================================
// FONCTIONS
// ==========================================
function renderContacts(contacts) {
    document.getElementById('totalClients').textContent = contacts.length;
    
    if (contacts.length === 0) {
        clientList.innerHTML = `
            <div class="text-center text-muted small py-4">
                <i class="fas fa-users fa-2x d-block mb-2 opacity-25"></i>
                <p>Aucun contact</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    contacts.forEach(contact => {
        const initial = contact.username.charAt(0).toUpperCase();
        const isActive = currentRecipient === contact.username;
        const unreadBadge = contact.unread > 0 ? `<span class="badge-unread">${contact.unread}</span>` : '';
        
        html += `
            <div class="contact-item ${isActive ? 'active' : ''}" data-username="${contact.username}" onclick="openConversation('${contact.username}')">
                <div class="contact-avatar">${initial}</div>
                <div class="contact-info">
                    <div class="name">${contact.username}</div>
                    <div class="last-message">${contact.last_message || 'Aucun message'}</div>
                </div>
                <div class="contact-meta">
                    <div class="time">${contact.time || ''}</div>
                    ${unreadBadge}
                </div>
            </div>
        `;
    });
    
    clientList.innerHTML = html;
}

function renderMessages(messages, otherUser) {
    chatMessages.innerHTML = '';
    
    if (messages.length === 0) {
        chatMessages.innerHTML = `
            <div class="text-center text-muted small py-4">
                <i class="fas fa-comment-dots fa-2x d-block mb-2 opacity-25"></i>
                <p>Début de la conversation avec ${otherUser}</p>
            </div>
        `;
        return;
    }
    
    messages.forEach(msg => {
        const isReceived = msg.expediteur !== currentUser;
        addMessage(msg.contenu, isReceived, msg.date_envoi);
    });
    
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addMessage(text, isReceived, time) {
    const div = document.createElement('div');
    div.className = `message ${isReceived ? 'received' : 'sent'}`;
    
    const timeFormatted = time ? new Date(time).toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'}) : '';
    
    div.innerHTML = `
        <div>${text}</div>
        <div class="message-time">${timeFormatted}</div>
    `;
    
    chatMessages.appendChild(div);
}

function openConversation(username) {
    currentRecipient = username;
    chatUserName.textContent = username;
    chatUserStatus.textContent = 'En ligne';
    chatUserStatus.style.color = '#2ECC71';
    
    document.querySelectorAll('.contact-item').forEach(el => {
        el.classList.toggle('active', el.dataset.username === username);
    });
    
    if (window.innerWidth < 768) {
        chatSidebar.classList.remove('open');
    }
    
    ws.send(JSON.stringify({
        action: 'get_conversation',
        other_user: username
    }));
}

// ==========================================
// ÉVÉNEMENTS
// ==========================================
chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = chatInput.value.trim();
    
    if (!message) return;
    if (!currentRecipient) {
        if (!isSupport) {
            currentRecipient = 'admin';
            chatUserName.textContent = 'Support';
            chatUserStatus.textContent = 'En ligne';
            chatUserStatus.style.color = '#2ECC71';
        } else {
            alert('Veuillez sélectionner un client.');
            return;
        }
    }
    
    ws.send(JSON.stringify({
        action: 'send_message',
        contenu: message,
        destinataire: currentRecipient
    }));
    
    addMessage(message, false, new Date().toISOString());
    chatInput.value = '';
    chatMessages.scrollTop = chatMessages.scrollHeight;
});

chatInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        chatForm.dispatchEvent(new Event('submit'));
    }
});

toggleSidebar.addEventListener('click', function() {
    chatSidebar.classList.toggle('open');
});

searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    document.querySelectorAll('.contact-item').forEach(item => {
        const name = item.dataset.username.toLowerCase();
        item.style.display = name.includes(query) ? 'flex' : 'none';
    });
});
</script>
{% endblock %}
