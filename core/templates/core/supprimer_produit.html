{% extends 'base.html' %}
{% load static %}

{% block title %}Supprimer {{ produit.nom }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-12">
        <div class="card-modern p-4 text-center">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-4x text-danger"></i>
            </div>
            <h4 class="fw-bold">Supprimer le produit</h4>
            <p class="text-muted">
                Êtes-vous sûr de vouloir supprimer <strong>{{ produit.nom }}</strong> ?
                <br>Cette action est irréversible.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <button type="submit" class="btn btn-danger rounded-pill px-4">
                        <i class="fas fa-trash-alt me-2"></i> Oui, supprimer
                    </button>
                    <a href="{% url 'core:liste_produits_entreprise' %}" class="btn btn-outline-secondary rounded-pill px-4">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
