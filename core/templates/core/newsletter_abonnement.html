{% extends 'base.html' %}
{% load static %}

{% block title %}S'abonner à la newsletter{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-12">
        <div class="card-modern p-4">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-3 mb-3">
                    <i class="fas fa-envelope fa-3x text-primary"></i>
                </div>
                <h4 class="fw-bold">📬 Newsletter</h4>
                <p class="text-muted small">
                    Recevez nos promotions, nouveautés et offres exclusives
                </p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email *</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0">
                            <i class="fas fa-envelope text-muted"></i>
                        </span>
                        <input type="email" name="email" class="form-control form-control-lg" 
                               placeholder="votre@email.com" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nom (optionnel)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0">
                            <i class="fas fa-user text-muted"></i>
                        </span>
                        <input type="text" name="nom" class="form-control form-control-lg" 
                               placeholder="Votre nom">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-gradient w-100 rounded-pill py-3">
                    <i class="fas fa-check-circle me-2"></i> S'abonner
                </button>
            </form>
            
            <hr class="my-4">
            
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'core:accueil' %}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="fas fa-arrow-left me-2"></i> Retour à l'accueil
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
