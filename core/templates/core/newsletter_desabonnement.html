{% extends 'base.html' %}
{% load static %}

{% block title %}Désabonnement newsletter{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-12">
        <div class="card-modern p-4 text-center">
            <div class="mb-4">
                <i class="fas fa-envelope-open fa-4x text-danger"></i>
            </div>
            
            <h4 class="fw-bold">Se désabonner</h4>
            <p class="text-muted">
                Voulez-vous vraiment vous désabonner de la newsletter ?
                <br>
                <strong>{{ abonne.email }}</strong>
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <button type="submit" class="btn btn-danger rounded-pill px-4">
                        <i class="fas fa-times-circle me-2"></i> Oui, me désabonner
                    </button>
                    <a href="{% url 'core:accueil' %}" class="btn btn-outline-secondary rounded-pill px-4">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
