{% extends 'base.html' %}
{% load static %}

{% block title %}Erreur serveur - Ma Boutique{% endblock %}

{% block content %}
<div class="row justify-content-center text-center">
    <div class="col-lg-6 col-md-8 col-12">
        <div class="card-modern p-5">
            <div class="mb-4">
                <i class="fas fa-bug fa-5x text-danger"></i>
            </div>
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <h2 class="fw-bold mb-3">Erreur serveur</h2>
            <p class="text-muted mb-4">
                Une erreur est survenue. Nous travaillons à résoudre le problème.
            </p>
            <a href="{% url 'core:accueil' %}" class="btn btn-primary-gradient rounded-pill px-4">
                <i class="fas fa-home me-2"></i> Retour à l'accueil
            </a>
        </div>
    </div>
</div>

<style>
    .card-modern {
        background: var(--white);
        border: none;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        transition: var(--transition);
    }
    
    .card-modern:hover {
        box-shadow: var(--shadow-hover);
    }
</style>
{% endblock %}
